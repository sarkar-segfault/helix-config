theme = "catppuccin_mocha"

[keys.insert]
A-h = ":buffer-previous"
A-l = ":buffer-next"
A-j = ":buffer-close"
A-s = ":write-all"
A-q = ":write-quit-all"

[keys.normal]
A-h = ":buffer-previous"
A-l = ":buffer-next"
A-j = ":buffer-close!"
A-s = ":write-all!"
A-q = ":write-quit-all!"

[editor]
true-color = true
default-yank-register = "+"
shell = ["C:\\Program Files\\Git\\bin\\bash.exe", "-c"]
cursorline = true
continue-comments = false
bufferline = "always"
popup-border = "all"
end-of-line-diagnostics = "hint"

[editor.inline-diagnostics]
cursor-line = "hint"
other-lines = "disable"

[editor.cursor-shape]
normal = "bar"
insert = "bar"
select = "underline"

[editor.file-picker]
hidden = false
git-ignore = true

[editor.soft-wrap]
enable = true
