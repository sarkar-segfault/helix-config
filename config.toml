theme = "catppuccin_mocha"

[keys.insert]
C-p = ":buffer-next"
C-n = ":buffer-previous"
C-k = ":buffer-close"
C-s = ":write-all"
C-q = ":write-quit-all"

[keys.normal]
C-p = ":buffer-next"
C-n = ":buffer-previous"
C-k = ":buffer-close!"
C-s = ":write-all!"
C-q = ":write-quit-all!"

[editor]
true-color = true
scroll-lines = 1
default-yank-register = "+"
shell = ["C:\\Program Files\\Git\\usr\\bin\\bash.exe", "-c"]
cursorline = true
continue-comments = false
bufferline = "always"
popup-border = "all"
auto-format = true
end-of-line-diagnostics = "hint"

[editor.inline-diagnostics]
cursor-line = "hint"
other-lines = "disable"

[editor.cursor-shape]
normal = "bar"
insert = "bar"
select = "underline"

[editor.file-picker]
hidden = false
git-ignore = true

[editor.soft-wrap]
enable = true
